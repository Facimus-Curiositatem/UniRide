version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: uniride-postgres
    restart: always
    environment:
      POSTGRES_DB: uniride_db
      POSTGRES_USER: uniride_user
      POSTGRES_PASSWORD: uniride_pass
      TZ: America/Bogota
      PGTZ: America/Bogota
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uniride_user -d uniride_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: