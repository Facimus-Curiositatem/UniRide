<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>UniRide – Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        /* Tus estilos existentes (se mantienen igual) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #0a1628; color: #fff; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; min-height: 100vh; background: #0d1f35; display: flex; flex-direction: column; padding: 1.5rem 1rem; border-right: 1px solid rgba(255,255,255,0.06); position: fixed; top: 0; left: 0; height: 100vh; }
        .sidebar-logo { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.75rem; margin-bottom: 2rem; }
        .logo-icon { width: 40px; height: 40px; background: #f5a623; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.1rem; color: #0d1f35; }
        .logo-text { font-size: 1.2rem; font-weight: 700; color: #fff; }
        .nav { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .nav-item { display: flex; align-items: center; gap: 0.85rem; padding: 0.75rem 1rem; border-radius: 12px; color: #7a8fa6; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.2s; text-decoration: none; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { background: #1e3a5a; color: #fff; }
        .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }
        .nav-bottom { margin-top: auto; }
        .nav-item.logout:hover { color: #ff6b6b; background: rgba(255,107,107,0.08); }
        .main { margin-left: 260px; flex: 1; padding: 2rem 2.5rem; min-height: 100vh; }
        .header { margin-bottom: 1.75rem; }
        .header h1 { font-size: 2rem; font-weight: 800; color: #fff; margin-bottom: 0.25rem; }
        .header .date { font-size: 0.9rem; color: #5a7a99; }
        .search-bar { background: #0d1f35; border-radius: 16px; padding: 1.1rem 1.5rem; display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; border: 1px solid rgba(255,255,255,0.06); }
        .search-bar svg { color: #5a7a99; width: 20px; height: 20px; flex-shrink: 0; }
        .search-bar input { flex: 1; background: #162840; border: 1.5px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 0.7rem 1rem; color: #fff; font-size: 0.92rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
        .search-bar input::placeholder { color: #3a5a7a; }
        .search-bar input:focus { border-color: #f5a623; }
        .btn-buscar { padding: 0.7rem 1.8rem; background: #f5a623; color: #0d1f35; border: none; border-radius: 50px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.2s; font-family: 'Inter', sans-serif; white-space: nowrap; }
        .btn-buscar:hover { background: #e09516; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: #0d1f35; border-radius: 16px; padding: 1.3rem 1.4rem; border: 1px solid rgba(255,255,255,0.06); position: relative; }
        .stat-icon-wrap { width: 40px; height: 40px; background: rgba(245,166,35,0.12); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
        .stat-icon-wrap svg { width: 20px; height: 20px; color: #f5a623; }
        .stat-dot { position: absolute; top: 1.3rem; right: 1.4rem; width: 8px; height: 8px; background: #f5a623; border-radius: 50%; }
        .stat-number { font-size: 1.8rem; font-weight: 800; color: #fff; line-height: 1; margin-bottom: 0.3rem; }
        .stat-label { font-size: 0.82rem; color: #5a7a99; }
        .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .card { background: #0d1f35; border-radius: 16px; padding: 1.4rem; border: 1px solid rgba(255,255,255,0.06); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
        .card-header h2 { font-size: 1.1rem; font-weight: 700; color: #fff; }
        .card-header span { font-size: 0.82rem; color: #5a7a99; }
        .trip-item { display: flex; align-items: center; gap: 0.9rem; padding: 0.85rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .trip-item:last-child { border-bottom: none; }
        .trip-avatar { width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0; background: #1e3a5a; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; color: #f5a623; }
        .trip-info { flex: 1; }
        .trip-name { font-size: 0.9rem; font-weight: 600; color: #fff; margin-bottom: 0.2rem; }
        .trip-route { font-size: 0.78rem; color: #5a7a99; }
        .trip-badge { font-size: 0.72rem; padding: 0.2rem 0.6rem; border-radius: 20px; font-weight: 500; margin-left: 0.4rem; }
        .badge-ing { background: rgba(99,153,34,0.15); color: #97c459; }
        .badge-der { background: rgba(53,130,221,0.15); color: #85b7eb; }
        .badge-med { background: rgba(212,83,126,0.15); color: #ed93b1; }
        .trip-price { font-size: 0.95rem; font-weight: 700; color: #f5a623; white-space: nowrap; }
        .map-placeholder { background: #0a1a2e; border-radius: 12px; height: 220px; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.06); }
        .map-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(245,166,35,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(245,166,35,0.05) 1px, transparent 1px); background-size: 40px 40px; }
        .map-pin { position: absolute; width: 14px; height: 14px; background: #f5a623; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 12px rgba(245,166,35,0.6); }
        .map-pin-1 { top: 35%; left: 40%; }
        .map-pin-2 { top: 55%; left: 60%; }
        .map-pin-3 { top: 25%; left: 65%; }
        .map-route { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .map-label { position: absolute; bottom: 1rem; left: 1rem; font-size: 0.75rem; color: #5a7a99; }
        .loading { text-align: center; color: #5a7a99; padding: 2rem; }
        .empty { text-align: center; color: #5a7a99; padding: 2rem; }
    </style>
</head>
<body>
<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-icon">U</div>
        <span class="logo-text">UniRide</span>
    </div>
    <nav class="nav">
        <a class="nav-item active" href="dashboard.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            Inicio
        </a>
        <a class="nav-item" href="buscar-viajes.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35"/></svg>
            Buscar viajes
        </a>
        <a class="nav-item" href="publicar-viaje.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Publicar viaje
        </a>
        <a class="nav-item" href="en-vivo.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14m-6 2H5a2 2 0 01-2-2V10a2 2 0 012-2h4l6-3v14l-6-3z"/></svg>
            En vivo
        </a>
        <a class="nav-item" href="perfil.html">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            Mi perfil
        </a>
        <div class="nav-bottom">
            <a class="nav-item logout" href="#" onclick="logout(); return false;">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Cerrar sesión
            </a>
        </div>
    </nav>
</aside>

<main class="main">
    <div class="header">
        <h1>¡Hola, <span id="user-name">...</span>! 👋</h1>
        <p class="date" id="current-date"></p>
    </div>

    <div class="search-bar">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="origen" placeholder="Origen" />
        <input type="text" id="destino" placeholder="Destino" />
        <button class="btn-buscar" onclick="buscarViajes()">Buscar</button>
    </div>

    <!-- Stats Grid - Actualizado -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon-wrap"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg></div>
            <div class="stat-dot"></div>
            <div class="stat-number" id="stat-disponibles">--</div>
            <div class="stat-label">Viajes disponibles</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon-wrap"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
            <div class="stat-number" id="stat-completados">--</div>
            <div class="stat-label">Viajes completados</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon-wrap"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
            <div class="stat-number" id="stat-ahorrado">$--</div>
            <div class="stat-label">Dinero ahorrado</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon-wrap"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg></div>
            <div class="stat-number" id="stat-rating">--</div>
            <div class="stat-label">Tu calificación</div>
        </div>
    </div>

    <div class="bottom-grid">
        <div class="card">
            <div class="card-header">
                <h2>Viajes próximos</h2>
                <span>Próximas salidas</span>
            </div>
            <div id="trips-list"><div class="loading">Cargando viajes...</div></div>
        </div>
        <div class="card">
            <div class="card-header"><h2>Mapa en vivo</h2></div>
            <div class="map-placeholder">
                <div class="map-grid"></div>
                <svg class="map-route" viewBox="0 0 400 220" fill="none">
                    <path d="M80 160 Q150 80 200 110 Q260 140 310 70" stroke="#f5a623" stroke-width="2" stroke-dasharray="6 4" opacity="0.5"/>
                </svg>
                <div class="map-pin map-pin-1"></div>
                <div class="map-pin map-pin-2"></div>
                <div class="map-pin map-pin-3"></div>
                <div class="map-label">Bogotá, Colombia</div>
            </div>
        </div>
    </div>
</main>

<script>
    const API_BASE = window.location.hostname.includes('localhost') 
        ? 'http://localhost:8080'
        : 'https://zany-space-orbit-5gxx6pv5jvpqcvwq9-8080.app.github.dev';
    
    const token = localStorage.getItem('uniride_token');
    const userName = localStorage.getItem('uniride_name') || localStorage.getItem('uniride_email')?.split('@')[0] || 'Usuario';

    if (!token) window.location.href = 'index.html';

    document.getElementById('user-name').textContent = userName;

    const now = new Date();
    const dias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
    const meses = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
    document.getElementById('current-date').textContent = `${dias[now.getDay()]}, ${now.getDate()} de ${meses[now.getMonth()]} de ${now.getFullYear()}`;

    async function cargarViajes() {
        try {
            const res = await fetch(`${API_BASE}/api/trips/upcoming`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            if (!res.ok) throw new Error();
            
            const trips = await res.json();
            const tripsArray = Array.isArray(trips) ? trips : [];

            document.getElementById('stat-disponibles').textContent = tripsArray.length;

            const lista = document.getElementById('trips-list');
            
            if (tripsArray.length === 0) {
                lista.innerHTML = '<div class="empty">No hay viajes disponibles hoy</div>';
                return;
            }

            const badges = ['badge-ing', 'badge-der', 'badge-med'];
            

            lista.innerHTML = tripsArray.slice(0, 4).map((t, i) => {
                const iniciales = t.driverName?.split(' ').map(n => n[0]).join('').slice(0, 2) || 'U';
                const hora = t.departure ? new Date(t.departure).toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' }) : '--:--';
                
                return `
                <div class="trip-item">
                    <div class="trip-avatar">${iniciales}</div>
                    <div class="trip-info">
                        <div class="trip-name">
                            ${t.driverName || 'Conductor'}
                        </div>
                        <div class="trip-route">${t.origin || '?'} → ${t.destination || '?'} · ${hora}</div>
                    </div>
                    <div class="trip-price">$${Number(t.price).toLocaleString('es-CO')}</div>
                </div>`;
            }).join('');
            
        } catch (error) {
            console.error('Error cargando viajes:', error);
            document.getElementById('stat-disponibles').textContent = '0';
            document.getElementById('trips-list').innerHTML = '<div class="empty">Error al cargar viajes</div>';
        }
    }

    function buscarViajes() {
        const origen = document.getElementById('origen')?.value.trim() || '';
        const destino = document.getElementById('destino')?.value.trim() || '';
        const params = new URLSearchParams();
        if (origen) params.set('origen', origen);
        if (destino) params.set('destino', destino);
        window.location.href = 'buscar-viajes.html' + (params.toString() ? '?' + params.toString() : '');
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    cargarViajes();

    async function cargarEstadisticas() {
    try {
        const res = await fetch(`${API_BASE}/api/trips/stats`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (!res.ok) throw new Error();
        
        const stats = await res.json();
        
        // Actualizar valores
        document.getElementById('stat-disponibles').textContent = stats.viajesDisponibles || 0;
        document.getElementById('stat-completados').textContent = stats.viajesCompletados || 0;
        document.getElementById('stat-ahorrado').textContent = `$${Number(stats.dineroAhorrado || 0).toLocaleString('es-CO')}`;
        document.getElementById('stat-rating').textContent = stats.calificacion?.toFixed(1) || '5.0';
        
    } catch (error) {
        console.error('Error cargando estadísticas:', error);
        document.getElementById('stat-disponibles').textContent = '0';
        document.getElementById('stat-completados').textContent = '0';
        document.getElementById('stat-ahorrado').textContent = '$0';
        document.getElementById('stat-rating').textContent = '5.0';
    }
}

// Llamar la función junto con cargarViajes
async function cargarDatos() {
    await cargarViajes();
    await cargarEstadisticas();
}

// Reemplazar la llamada original
cargarDatos();

</script>
</body>
</html>
