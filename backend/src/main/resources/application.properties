# DATABASE
spring.datasource.url=jdbc:postgresql://localhost:5432/uniride_db
spring.datasource.username=uniride_user
spring.datasource.password=uniride_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SERVER
server.port=8080

# JWT (externalizado del código)
jwt.secret=uniride_super_secret_key_uniride_1234567890
jwt.expiration=86400000